<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cursor Tetris (MVP)</title>
    <style>
      body {
        margin: 0;
        background: #0b1020;
        color: #e8eefc;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans",
          sans-serif;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .card {
        position: relative;
      }
      #hud {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        font-size: 14px;
      }
      #board-wrap {
        position: relative;
      }
      #game {
        background: #0b1020;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(3px);
      }
      #overlay.hidden {
        display: none;
      }
      #overlayText {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .hint {
        font-size: 13px;
        opacity: 0.95;
        text-align: center;
        line-height: 1.35;
      }
      .hint kbd {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 2px 6px;
        border-radius: 6px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div id="hud">
          <div>Score: <span id="score">0</span></div>
          <div class="hint">
            <div><kbd>←</kbd> / <kbd>→</kbd> move</div>
            <div><kbd>↑</kbd> rotate</div>
            <div><kbd>↓</kbd> soft drop</div>
            <div><kbd>Space</kbd> hard drop</div>
            <div><kbd>P</kbd> pause <span style="opacity:0.7">(optional)</span></div>
            <div><kbd>R</kbd> restart</div>
          </div>
        </div>

        <div id="board-wrap">
          <canvas id="game" aria-label="Tetris game"></canvas>
          <div id="overlay" class="hidden" aria-live="polite">
            <div id="overlayText"></div>
            <div class="hint" id="overlayHint"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
